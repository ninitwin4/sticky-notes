{% extends "notes/base.html" %}

{% block title %}Delete Note{% endblock %}

{% block content %}
    <h1 class="mb-4">Delete this note?</h1>
    <div class="card border-danger mb-4">
        <div class="card-body">
            <h5 class="card-title">{{ note.title|default:"Untitled" }}</h5>
            <p class="card-text">{{ note.content }}</p>
        </div>
    </div>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'note_detail' note.pk %}" class="btn btn-link">Cancel</a>
    </form>
{% endblock %}
