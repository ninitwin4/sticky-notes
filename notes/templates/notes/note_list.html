{% extends "notes/base.html" %}

{% block title %}My Notes{% endblock %}

{% block content %}
    <h1 class="mb-4">My Notes</h1>
    <a href="{% url 'note_create' %}" class="btn btn-primary mb-4">+ New Note</a>

    {% for note in notes %}
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">
                    <a href="{% url 'note_detail' note.pk %}" class="text-decoration-none">
                        {{ note.title|default:"Untitled" }}
                    </a>
                </h5>
                <p class="card-text">{{ note.content }}</p>
                <small class="text-muted">Updated {{ note.updated_at }}</small>
            </div>
        </div>
    {% empty %}
        <p>No notes yet.</p>
    {% endfor %}
{% endblock %}
