{% extends "notes/base.html" %}

{% block title %}Note Form{% endblock %}

{% block content %}
    <h1 class="mb-4">Note</h1>
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{% url 'note_list' %}" class="btn btn-link">← Cancel</a>
            </form>
        </div>
    </div>
{% endblock %}
