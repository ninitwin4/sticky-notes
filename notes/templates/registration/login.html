{% extends "notes/base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
    <h1 class="mb-4">Log In</h1>
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">
                    Log In
                </button>
            </form>
        </div>
    </div>
    <p class="mt-3">
        No account? <a href="{% url 'signup' %}">Sign up</a>
    </p>
{% endblock %}
