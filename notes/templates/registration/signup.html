{% extends "notes/base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
    <h1 class="mb-4">Sign Up</h1>
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">
                    Sign Up
                </button>
            </form>
        </div>
    </div>
{% endblock %}
